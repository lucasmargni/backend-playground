type User {
    id: ID!
    username: String!
    email: String
    posts: [Post!]!
}

type Post {
    id: ID!
    text: String!
    tags: [String!]!
    user: User!
    comments: [Comment!]!
}

type Comment {
    id: ID!
    text: String!
    likes: Int!
    dislikes: Int!
    user: User!
    post: Post!
}

type Query {
    posts: [Post!]!
    post(id: ID!) : Post
    userById(id: ID!) : User
    userByUsername(username: String!) : User
}

type Mutation {
    addUser(username: String!, email: String) : User!
    addPost(text: String!, tags: [String!]!, userId: ID!) : Post!
    addComment(text: String!, userId: ID!, postId: ID!) : Comment!
    likeComment(commentId: ID!, userId: ID!) : Comment!
    dislikeComment(commentId: ID!, userId: ID!) : Comment!
}